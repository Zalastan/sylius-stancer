services:
    _defaults:
        autowire: true
        autoconfigure: false

    SpiderWeb\Sylius\StancerPlugin\Form\Type\StancerGatewayConfigurationType:
        tags:
            - { name: sylius.gateway_configuration_type, type: stancer, label: 'sylius_stancer.ui.gateway_label' }
            - { name: form.type }

    SpiderWeb\Sylius\StancerPlugin\Form\Extension\StancerGatewayConfigTypeExtension:
        tags:
            - { name: form.type_extension }

    # --- CommandProviders ---

    SpiderWeb\Sylius\StancerPlugin\CommandProvider\CapturePaymentRequestCommandProvider:
        tags:
            - { name: stancer.payment_request.command_provider, action: capture }

    SpiderWeb\Sylius\StancerPlugin\CommandProvider\StatusPaymentRequestCommandProvider:
        tags:
            - { name: stancer.payment_request.command_provider, action: status }

    SpiderWeb\Sylius\StancerPlugin\CommandProvider\StancerActionsCommandProvider:
        class: Sylius\Bundle\PaymentBundle\CommandProvider\ActionsCommandProvider
        arguments:
            - !tagged_locator { tag: stancer.payment_request.command_provider, index_by: action }
        tags:
            - { name: sylius.payment_request.command_provider, gateway-factory: stancer }

    # --- CommandHandlers ---

    SpiderWeb\Sylius\StancerPlugin\CommandHandler\CapturePaymentRequestHandler:
        tags:
            - { name: messenger.message_handler, bus: sylius.payment_request.command_bus }

    SpiderWeb\Sylius\StancerPlugin\CommandHandler\StatusPaymentRequestHandler:
        tags:
            - { name: messenger.message_handler, bus: sylius.payment_request.command_bus }

    # --- HttpResponseProviders ---

    SpiderWeb\Sylius\StancerPlugin\Provider\CaptureHttpResponseProvider:
        tags:
            - { name: stancer.payment_request.provider.http_response, action: capture }

    SpiderWeb\Sylius\StancerPlugin\Provider\StatusHttpResponseProvider:
        arguments:
            $finalUrlProvider: '@sylius_shop.provider.order_pay.final_url'
        tags:
            - { name: stancer.payment_request.provider.http_response, action: status }

    SpiderWeb\Sylius\StancerPlugin\Provider\StancerActionsHttpResponseProvider:
        class: Sylius\Bundle\PaymentBundle\Provider\ActionsHttpResponseProvider
        arguments:
            - !tagged_locator { tag: stancer.payment_request.provider.http_response, index_by: action }
        tags:
            - { name: sylius.payment_request.provider.http_response, gateway-factory: stancer }

    # --- Refund ---

    SpiderWeb\Sylius\StancerPlugin\Processor\StancerPaymentRefundProcessor: ~

    SpiderWeb\Sylius\StancerPlugin\EventListener\Workflow\RefundPaymentListener:
        tags:
            - { name: kernel.event_listener, event: workflow.sylius_payment.transition.refund, priority: 100 }
